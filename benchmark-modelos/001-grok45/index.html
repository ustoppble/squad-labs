<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Solar 3D — Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #e8eef7;
    }
    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; width: 100%; height: 100%; }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      pointer-events: none;
      max-width: min(360px, calc(100vw - 32px));
    }
    #hud h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f5c542;
      text-shadow: 0 0 12px rgba(245, 197, 66, 0.45);
      margin-bottom: 6px;
    }
    #hud p {
      font-size: 12px;
      line-height: 1.55;
      color: rgba(232, 238, 247, 0.72);
    }
    #hud kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 11px;
      font-family: ui-monospace, monospace;
      color: #fff;
    }

    #info-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      width: min(320px, calc(100vw - 32px));
      padding: 18px 20px 16px;
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(12, 18, 32, 0.92), rgba(6, 10, 20, 0.88));
      border: 1px solid rgba(245, 197, 66, 0.28);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      transform: translateY(-8px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    #info-panel .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
      box-shadow: 0 0 10px currentColor;
    }
    #info-panel h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
    }
    #info-panel .type {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(245, 197, 66, 0.85);
      margin-bottom: 14px;
    }
    #info-panel dl {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      font-size: 13px;
    }
    #info-panel dt {
      color: rgba(232, 238, 247, 0.55);
    }
    #info-panel dd {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }
    #info-panel .desc {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      line-height: 1.55;
      color: rgba(232, 238, 247, 0.7);
    }
    #info-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    #info-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    #speed-control {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(8, 12, 22, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      font-size: 12px;
      color: rgba(232, 238, 247, 0.75);
    }
    #speed-control label { white-space: nowrap; }
    #speed-control input[type="range"] {
      width: min(180px, 30vw);
      accent-color: #f5c542;
    }
    #speed-value {
      min-width: 3.2em;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #f5c542;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin: -6px 0 0 -6px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #crosshair.active { opacity: 1; }

    #lock-hint {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 8px 14px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.55);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #lock-hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="crosshair"></div>

  <div id="hud">
    <h1>Sistema Solar 3D</h1>
    <p>
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> mover ·
      <kbd>Q</kbd>/<kbd>E</kbd> subir/descer ·
      <kbd>Shift</kbd> turbo ·
      mouse olhar ·
      roda zoom ·
      clique planeta ·
      <kbd>Esc</kbd> liberar mouse
    </p>
  </div>

  <div id="info-panel" aria-live="polite">
    <button type="button" id="info-close" aria-label="Fechar">×</button>
    <h2><span class="swatch" id="info-swatch"></span><span id="info-name">—</span></h2>
    <div class="type" id="info-type">—</div>
    <dl id="info-stats"></dl>
    <p class="desc" id="info-desc"></p>
  </div>

  <div id="speed-control">
    <label for="speed">Tempo orbital</label>
    <input type="range" id="speed" min="0" max="100" value="25" />
    <span id="speed-value">1.0×</span>
  </div>

  <div id="lock-hint">Clique na cena para capturar o mouse e voar</div>

  <script type="importmap">

    }
  }
  </script>

        },

      },
      {

      },
      {

        periodDays: 30688.5,
        tilt: 97.8,
        hasRing: true,
        ringColor: 0xa0c8d8,
        facts: {
          "Diâmetro": "50.724 km",
          "Distância ao Sol": "19,2 UA (2,87 bi km)",
          "Período orbital": "84,0 anos",
          "Dia sideral": "17 h 14 min",
          "Luas": "28",
          "Inclinação do eixo": "≈ 98°",
        },
        desc: "Gira de lado — eixo quase no plano da órbita. Cor azul-esverdeada por metano na atmosfera.",
      },
      {
        id: "neptune",
        name: "Netuno",
        type: "Gigante de gelo",
        color: 0x3f5fd4,
        emissive: 0x081028,
        radius: 1.5,
        distance: 30.05 * DIST_SCALE * 0.24,
        periodDays: 60182,
        tilt: 28.3,
        hasRing: false,
        facts: {
          "Diâmetro": "49.244 km",
          "Distância ao Sol": "30,1 UA (4,5 bi km)",
          "Período orbital": "164,8 anos",
          "Dia sideral": "16 h 6 min",
          "Luas": "16 (Tritão)",
          "Ventos": "até ~2.000 km/h",
        },
        desc: "O planeta mais distante. Azul intenso e os ventos mais rápidos do Sistema Solar.",
      },
    ];

    // ── Renderer / Scene / Camera ──
    const container = document.getElementById("canvas-container");
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02040a);
    scene.fog = new THREE.FogExp2(0x02040a, 0.0018);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(0, 28, 72);

    // ── Controles de voo (PointerLock + WASD) ──
    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());

    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false };
    let moveSpeed = 28;
    let timeScale = 1;

    const lockHint = document.getElementById("lock-hint");
    const crosshair = document.getElementById("crosshair");

    controls.addEventListener("lock", () => {
      lockHint.classList.add("hidden");
      crosshair.classList.add("active");
    });
    controls.addEventListener("unlock", () => {
      lockHint.classList.remove("hidden");
      crosshair.classList.remove("active");
    });

    container.addEventListener("click", (e) => {
      // Clique em planeta tem prioridade quando já está locked ou via raycast
      if (!controls.isLocked) {
        // Se clicar e não estiver locked, tenta selecionar OU lock
        const hit = pickBody(e.clientX, e.clientY);
        if (hit) {
          showInfo(hit.userData.body);
        } else {
          controls.lock();
        }
      } else {
        const hit = pickBody(e.clientX, e.clientY);
        if (hit) showInfo(hit.userData.body);
      }
    });

    document.addEventListener("keydown", (e) => {
      const k = e.code;
      if (k === "KeyW") keys.w = true;
      if (k === "KeyA") keys.a = true;
      if (k === "KeyS") keys.s = true;
      if (k === "KeyD") keys.d = true;
      if (k === "KeyQ") keys.q = true;
      if (k === "KeyE") keys.e = true;
      if (k === "ShiftLeft" || k === "ShiftRight") keys.shift = true;
      if (k === "Escape") hideInfo();
    });
    document.addEventListener("keyup", (e) => {
      const k = e.code;
      if (k === "KeyW") keys.w = false;
      if (k === "KeyA") keys.a = false;
      if (k === "KeyS") keys.s = false;
      if (k === "KeyD") keys.d = false;
      if (k === "KeyQ") keys.q = false;
      if (k === "KeyE") keys.e = false;
      if (k === "ShiftLeft" || k === "ShiftRight") keys.shift = false;
    });

    // Zoom (FOV + leve deslocamento para frente/trás)
    let targetFov = 60;
    window.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = Math.sign(e.deltaY);
      targetFov = THREE.MathUtils.clamp(targetFov + delta * 2.5, 25, 90);
      // Movimento sutil no eixo look quando locked
      if (controls.isLocked) {
        const forward = new THREE.Vector3();
        camera.getWorldDirection(forward);
        camera.position.addScaledVector(forward, -delta * 1.8);
      } else {
        const forward = new THREE.Vector3();
        camera.getWorldDirection(forward);
        camera.position.addScaledVector(forward, -delta * 2.5);
      }
    }, { passive: false });

    // ── Luzes ──
    const ambient = new THREE.AmbientLight(0x223344, 0.35);
    scene.add(ambient);

    const sunLight = new THREE.PointLight(0xfff2cc, 2.8, 0, 0.6);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    const fill = new THREE.DirectionalLight(0x4466aa, 0.15);
    fill.position.set(-40, 20, -30);
    scene.add(fill);

    // ── Estrelas de fundo ──
    function createStarfield(count) {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const color = new THREE.Color();

      for (let i = 0; i < count; i++) {
        // Distribuição em casca esférica
        const r = 800 + Math.random() * 1800;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);

        const t = Math.random();
        if (t < 0.15) color.setHSL(0.08, 0.5, 0.85);      // quentes
        else if (t < 0.35) color.setHSL(0.6, 0.35, 0.9); // azuladas
        else color.setHSL(0.15, 0.05, 0.75 + Math.random() * 0.25);

        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
        sizes[i] = 0.6 + Math.random() * 1.8;
      }

      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      geo.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        size: 1.6,
        vertexColors: true,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.95,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield(9000));
    // Segunda camada sutil
    const farStars = createStarfield(4000);
    farStars.material.size = 0.9;
    farStars.material.opacity = 0.55;
    scene.add(farStars);

    // ── Via Láctea sutil (disco de partículas) ──
    (function milkyWay() {
      const n = 2500;
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(n * 3);
      const col = new Float32Array(n * 3);
      const c = new THREE.Color();
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 600 + Math.random() * 1400;
        const y = (Math.random() - 0.5) * 80 * (1 - Math.random() * 0.5);
        pos[i * 3] = Math.cos(a) * r;
        pos[i * 3 + 1] = y + Math.sin(a * 2) * 20;
        pos[i * 3 + 2] = Math.sin(a) * r * 0.35;
        c.setHSL(0.62 + Math.random() * 0.08, 0.25, 0.45 + Math.random() * 0.3);
        col[i * 3] = c.r;
        col[i * 3 + 1] = c.g;
        col[i * 3 + 2] = c.b;
      }
      geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
      const pts = new THREE.Points(
        geo,
        new THREE.PointsMaterial({
          size: 2.2,
          vertexColors: true,
          transparent: true,
          opacity: 0.22,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        })
      );
      pts.rotation.z = 0.35;
      scene.add(pts);
    })();

    // ── Texturas procedurais (canvas) — sem arquivos externos ──
    function makePlanetTexture(baseHex, options = {}) {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const base = new THREE.Color(baseHex);

      // Gradiente base
      const g = ctx.createLinearGradient(0, 0, size, size);
      g.addColorStop(0, "#" + base.clone().offsetHSL(0, 0, 0.12).getHexString());
      g.addColorStop(0.5, "#" + base.getHexString());
      g.addColorStop(1, "#" + base.clone().offsetHSL(0, 0, -0.15).getHexString());
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);

      // Ruído / manchas
      for (let i = 0; i < 1800; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const r = 1 + Math.random() * (options.bands ? 40 : 8);
        const a = 0.03 + Math.random() * 0.08;
        const light = (Math.random() - 0.5) * 0.35;
        const c = base.clone().offsetHSL(
          (Math.random() - 0.5) * 0.04,
          (Math.random() - 0.5) * 0.1,
          light
        );
        ctx.fillStyle = `rgba(${(c.r * 255) | 0},${(c.g * 255) | 0},${(c.b * 255) | 0},${a})`;
        if (options.bands) {
          ctx.fillRect(0, y, size, r * 0.35);
        } else {
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Terra: continentes simplificados
      if (options.earth) {
        ctx.fillStyle = "rgba(40, 140, 70, 0.55)";
        for (let i = 0; i < 40; i++) {
          const x = Math.random() * size;
          const y = size * 0.15 + Math.random() * size * 0.7;
          ctx.beginPath();
          ctx.ellipse(x, y, 20 + Math.random() * 50, 12 + Math.random() * 30, Math.random() * Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }
        // pólos
        ctx.fillStyle = "rgba(240, 245, 255, 0.45)";
        ctx.fillRect(0, 0, size, 28);
        ctx.fillRect(0, size - 28, size, 28);
      }

      // Sol: granulação
      if (options.sun) {
        for (let i = 0; i < 400; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          ctx.fillStyle = `rgba(255, ${180 + Math.random() * 60 | 0}, 40, ${0.05 + Math.random() * 0.12})`;
          ctx.beginPath();
          ctx.arc(x, y, 2 + Math.random() * 10, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 4;
      return tex;
    }

    // ── Órbitas ──
    function createOrbitRing(radius) {
      const pts = [];
      const segments = 128;
      for (let i = 0; i <= segments; i++) {
        const a = (i / segments) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({
        color: 0x4a6080,
        transparent: true,
        opacity: 0.28,
      });
      return new THREE.Line(geo, mat);
    }

    // ── Anéis (Saturno / Urano) ──
    function createRings(inner, outer, colorHex) {
      const geo = new THREE.RingGeometry(inner, outer, 96);
      // UV fix for double-sided ring
      const pos = geo.attributes.position;
      const uv = geo.attributes.uv;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const u = (Math.atan2(y, x) / (Math.PI * 2)) + 0.5;
        const r = Math.sqrt(x * x + y * y);
        const v = (r - inner) / (outer - inner);
        uv.setXY(i, u, v);
      }
      // Textura de anéis
      const c = document.createElement("canvas");
      c.width = 512;
      c.height = 64;
      const ctx = c.getContext("2d");
      const base = new THREE.Color(colorHex);
      for (let x = 0; x < 512; x++) {
        const t = x / 512;
        const band = Math.sin(t * 40) * 0.5 + 0.5;
        const gap = Math.abs(t - 0.55) < 0.03 ? 0.05 : 1; // Cassini-ish
        const a = (0.35 + band * 0.45) * gap;
        const shade = 0.7 + band * 0.3;
        ctx.fillStyle = `rgba(${(base.r * 255 * shade) | 0},${(base.g * 255 * shade) | 0},${(base.b * 255 * shade) | 0},${a})`;
        ctx.fillRect(x, 0, 1, 64);
      }
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.85,
        depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      return mesh;
    }

    // ── Corpos ──
    const pickables = [];
    const orbiters = []; // { group, mesh, angularSpeed, spin, body }

    // Fase inicial aleatória (mas determinística o bastante visualmente)
    let phaseSeed = 1.7;

    BODIES.forEach((body) => {
      const group = new THREE.Group();
      group.name = body.id;

      let mesh;
      if (body.id === "sun") {
        const geo = new THREE.SphereGeometry(body.radius, 64, 64);
        const mat = new THREE.MeshBasicMaterial({
          map: makePlanetTexture(body.color, { sun: true }),
          color: 0xffffff,
        });
        mesh = new THREE.Mesh(geo, mat);

        // Corona / glow
        const glowGeo = new THREE.SphereGeometry(body.radius * 1.35, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({
          color: 0xffaa33,
          transparent: true,
          opacity: 0.12,
          side: THREE.BackSide,
          depthWrite: false,
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        group.add(glow);

        const glow2 = new THREE.Mesh(
          new THREE.SphereGeometry(body.radius * 1.8, 32, 32),
          new THREE.MeshBasicMaterial({
            color: 0xff8800,
            transparent: true,
            opacity: 0.05,
            side: THREE.BackSide,
            depthWrite: false,
          })
        );
        group.add(glow2);

        // Sprite glow
        const spriteCanvas = document.createElement("canvas");
        spriteCanvas.width = 128;
        spriteCanvas.height = 128;
        const sctx = spriteCanvas.getContext("2d");
        const grad = sctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        grad.addColorStop(0, "rgba(255,230,120,0.9)");
        grad.addColorStop(0.25, "rgba(255,180,40,0.35)");
        grad.addColorStop(0.55, "rgba(255,120,0,0.08)");
        grad.addColorStop(1, "rgba(255,80,0,0)");
        sctx.fillStyle = grad;
        sctx.fillRect(0, 0, 128, 128);
        const spriteMat = new THREE.SpriteMaterial({
          map: new THREE.CanvasTexture(spriteCanvas),
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          transparent: true,
          opacity: 0.9,
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(body.radius * 8, body.radius * 8, 1);
        group.add(sprite);
      } else {
        const geo = new THREE.SphereGeometry(body.radius, 48, 48);
        const mat = new THREE.MeshStandardMaterial({
          map: makePlanetTexture(body.color, {
            bands: !!body.bands,
            earth: body.id === "earth",
          }),
          roughness: body.bands ? 0.75 : 0.55,
          metalness: 0.05,
          emissive: new THREE.Color(body.emissive || 0x000000),
          emissiveIntensity: 0.35,
        });
        mesh = new THREE.Mesh(geo, mat);

        // Atmosfera sutil (Terra e gigantes)
        if (body.atmosphere || body.id === "venus" || body.type.includes("Gigante")) {
          const atmoColor = body.atmosphere || body.color;
          const atmo = new THREE.Mesh(
            new THREE.SphereGeometry(body.radius * 1.06, 32, 32),
            new THREE.MeshBasicMaterial({
              color: atmoColor,
              transparent: true,
              opacity: body.id === "earth" ? 0.12 : 0.07,
              side: THREE.BackSide,
              depthWrite: false,
            })
          );
          group.add(atmo);
        }

        if (body.hasRing) {
          const ring = createRings(
            body.radius * 1.35,
            body.radius * (body.id === "saturn" ? 2.35 : 1.9),
            body.ringColor || 0xd4c49a
          );
          // Inclinação do eixo
          ring.rotation.x = -Math.PI / 2 + THREE.MathUtils.degToRad(body.tilt || 0) * 0.15;
          group.add(ring);
        }

        // Linha de órbita
        scene.add(createOrbitRing(body.distance));
      }

      mesh.userData.body = body;
      mesh.userData.isPickable = true;
      group.add(mesh);
      pickables.push(mesh);

      // Hit sphere maior para facilitar clique em planetas pequenos
      if (body.id !== "sun") {
        const hit = new THREE.Mesh(
          new THREE.SphereGeometry(Math.max(body.radius * 2.2, 0.9), 16, 16),
          new THREE.MeshBasicMaterial({ visible: false })
        );
        hit.userData.body = body;
        hit.userData.isPickable = true;
        group.add(hit);
        pickables.push(hit);
      }

      // Inclinação axial visual
      if (body.tilt) {
        mesh.rotation.z = THREE.MathUtils.degToRad(Math.min(body.tilt, 40));
      }

      phaseSeed += 1.618;
      const angle0 = phaseSeed * Math.PI * 2;

      if (body.distance > 0) {
        group.position.set(
          Math.cos(angle0) * body.distance,
          0,
          Math.sin(angle0) * body.distance
        );
      }

      scene.add(group);

      const angularSpeed =
        body.periodDays > 0 ? (Math.PI * 2) / body.periodDays : 0;

      orbiters.push({
        group,
        mesh,
        angularSpeed,
        angle: angle0,
        distance: body.distance,
        spin: body.id === "sun" ? 0.05 : 0.4 + Math.random() * 0.3,
        body,
      });
    });

    // Lua da Terra (simples)
    const earthOrbiter = orbiters.find((o) => o.body.id === "earth");
    let moonGroup = null;
    if (earthOrbiter) {
      moonGroup = new THREE.Group();
      const moonMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 24, 24),
        new THREE.MeshStandardMaterial({
          map: makePlanetTexture(0xaaaaaa),
          roughness: 0.9,
          metalness: 0,
        })
      );
      moonMesh.userData.body = {
        id: "moon",
        name: "Lua",
        type: "Satélite natural da Terra",
        color: 0xaaaaaa,
        facts: {
          "Diâmetro": "3.474 km",
          "Distância à Terra": "≈ 384.400 km",
          "Período orbital": "27,3 dias",
          "Gravidade": "0,165 g",
          "Atmosfera": "praticamente nenhuma",
        },
        desc: "Único satélite natural da Terra. Controla as marés e estabiliza a obliquidade do eixo terrestre.",
      };
      moonMesh.userData.isPickable = true;
      moonGroup.add(moonMesh);
      pickables.push(moonMesh);
      earthOrbiter.group.add(moonGroup);
      moonGroup.position.set(1.6, 0.15, 0);
    }

    // ── Picking ──
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function pickBody(clientX, clientY) {
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(pickables, false);
      return hits.length ? hits[0].object : null;
    }

    // ── Painel de info ──
    const infoPanel = document.getElementById("info-panel");
    const infoName = document.getElementById("info-name");
    const infoType = document.getElementById("info-type");
    const infoStats = document.getElementById("info-stats");
    const infoDesc = document.getElementById("info-desc");
    const infoSwatch = document.getElementById("info-swatch");

    function showInfo(body) {
      if (!body) return;
      infoName.textContent = body.name;
      infoType.textContent = body.type || "Corpo celeste";
      const hex = body.color != null ? "#" + new THREE.Color(body.color).getHexString() : "#888";
      infoSwatch.style.background = hex;
      infoSwatch.style.color = hex;
      infoStats.innerHTML = "";
      if (body.facts) {
        Object.entries(body.facts).forEach(([k, v]) => {
          const dt = document.createElement("dt");
          dt.textContent = k;
          const dd = document.createElement("dd");
          dd.textContent = v;
          infoStats.appendChild(dt);
          infoStats.appendChild(dd);
        });
      }
      infoDesc.textContent = body.desc || "";
      infoPanel.classList.add("visible");
    }
    function hideInfo() {
      infoPanel.classList.remove("visible");
    }
    document.getElementById("info-close").addEventListener("click", (e) => {
      e.stopPropagation();
      hideInfo();
    });

    // ── Controle de velocidade do tempo ──
    const speedInput = document.getElementById("speed");
    const speedValue = document.getElementById("speed-value");
    function updateTimeScale() {
      // 0 → pausa; 25 → 1×; 100 → ~20×
      const v = Number(speedInput.value);
      if (v === 0) {
        timeScale = 0;
        speedValue.textContent = "pausa";
      } else {
        timeScale = Math.pow(v / 25, 1.6);
        speedValue.textContent = timeScale.toFixed(1) + "×";
      }
    }
    speedInput.addEventListener("input", updateTimeScale);
    updateTimeScale();

    // ── Resize ──
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animação ──
    const clock = new THREE.Clock();
    let moonAngle = 0;

    // Período orbital de referência: Mercúrio ≈ 88 dias.
    // Com timeScale=1, Mercúrio completa ~1 órbita a cada ~25 s de tempo real
    // (escala visual legível; razões entre planetas permanecem realistas).
    const REALTIME_MERCURY_ORBIT_SEC = 25;
    const MERCURY_PERIOD = 87.97;
    const simDaysPerSec = MERCURY_PERIOD / REALTIME_MERCURY_ORBIT_SEC;

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      // Zoom suave (FOV)
      camera.fov += (targetFov - camera.fov) * 0.12;
      camera.updateProjectionMatrix();

      // Movimento WASD
      const speed = moveSpeed * (keys.shift ? 3.2 : 1) * dt;
      direction.set(0, 0, 0);
      if (keys.w) direction.z -= 1;
      if (keys.s) direction.z += 1;
      if (keys.a) direction.x -= 1;
      if (keys.d) direction.x += 1;
      if (direction.lengthSq() > 0) {
        direction.normalize();
        // moveRight / moveForward do PointerLockControls
        controls.moveRight(direction.x * speed);
        controls.moveForward(-direction.z * speed);
      }
      // Vertical Q/E
      if (keys.q) controls.getObject().position.y -= speed;
      if (keys.e) controls.getObject().position.y += speed;

      // Amortecimento residual
      velocity.multiplyScalar(0.85);

      // Órbitas
      const simDt = dt * simDaysPerSec * timeScale;
      for (const o of orbiters) {
        if (o.angularSpeed > 0) {
          o.angle += o.angularSpeed * simDt;
          o.group.position.x = Math.cos(o.angle) * o.distance;
          o.group.position.z = Math.sin(o.angle) * o.distance;
          // leve inclinação orbital (quase plana)
          o.group.position.y = Math.sin(o.angle * 0.5) * o.distance * 0.008;
        }
        o.mesh.rotation.y += o.spin * dt * (0.3 + timeScale * 0.15);
      }

      // Lua
      if (moonGroup) {
        moonAngle += ((Math.PI * 2) / 27.3) * simDt;
        const mr = 1.65;
        moonGroup.position.set(Math.cos(moonAngle) * mr, 0.12, Math.sin(moonAngle) * mr);
      }

      // Sol pulsa levemente
      const sunOrb = orbiters.find((o) => o.body.id === "sun");
      if (sunOrb) {
        const pulse = 1 + Math.sin(clock.elapsedTime * 0.7) * 0.015;
        sunOrb.mesh.scale.setScalar(pulse);
      }

      renderer.render(scene, camera);
    }

    animate();

    // Foco inicial: olhar para o Sol
    camera.lookAt(0, 0, 0);
  </script>
</body>
</html>
