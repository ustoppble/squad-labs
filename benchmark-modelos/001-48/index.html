<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar 3D Interativo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: #cfd8ff; font-size: 12px; line-height: 1.6;
    background: rgba(10,14,30,0.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(120,140,220,0.25); border-radius: 10px;
    padding: 12px 14px; max-width: 260px; user-select: none;
  }
  #hud h1 { font-size: 13px; letter-spacing: .5px; color: #fff; margin-bottom: 8px; font-weight: 600; }
  #hud kbd {
    background: rgba(120,140,220,0.18); border: 1px solid rgba(120,140,220,0.35);
    border-radius: 4px; padding: 1px 5px; font-family: ui-monospace, monospace; font-size: 11px; color: #e6ebff;
  }
  #hud .row { margin: 3px 0; }

  #info {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    color: #e6ebff; width: 260px;
    background: rgba(10,14,30,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(120,140,220,0.3); border-radius: 12px;
    padding: 16px; opacity: 0; transform: translateX(20px);
    transition: opacity .3s ease, transform .3s ease; pointer-events: none;
  }
  #info.show { opacity: 1; transform: translateX(0); pointer-events: auto; }
  #info .swatch { width: 14px; height: 14px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 8px; box-shadow: 0 0 8px currentColor; }
  #info h2 { font-size: 18px; display: flex; align-items: center; margin-bottom: 10px; font-weight: 600; }
  #info table { width: 100%; font-size: 12px; border-collapse: collapse; }
  #info td { padding: 4px 0; vertical-align: top; }
  #info td.k { color: #8b9ad6; width: 45%; }
  #info td.v { color: #fff; text-align: right; }
  #info .close { position: absolute; top: 10px; right: 12px; cursor: pointer; color: #8b9ad6; font-size: 16px; line-height: 1; }
  #info .close:hover { color: #fff; }

  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 10; color: #aab4e0; font-size: 11px; letter-spacing: .3px;
    background: rgba(10,14,30,0.5); border: 1px solid rgba(120,140,220,0.2);
    border-radius: 20px; padding: 7px 16px; user-select: none;
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <h1>SISTEMA SOLAR 3D</h1>
  <div class="row"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> voar</div>
  <div class="row"><kbd>Q</kbd> / <kbd>E</kbd> descer / subir</div>
  <div class="row"><kbd>Shift</kbd> turbo</div>
  <div class="row">Mouse arrastar — olhar ao redor</div>
  <div class="row">Scroll — zoom</div>
  <div class="row">Clique num planeta — dados</div>
</div>

<div id="info">
  <span class="close" onclick="document.getElementById('info').classList.remove('show')">&times;</span>
  <h2><span class="swatch"></span><span class="pname"></span></h2>
  <table><tbody class="pdata"></tbody></table>
</div>

<div id="toast">Clique e arraste para olhar • WASD para voar</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 20000);
camera.position.set(0, 80, 260);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('app').appendChild(renderer.domElement);

// ---------- Estrelas no fundo ----------
function makeStars(count, spread) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    // distribuição em casca esférica distante
    const r = spread * (0.6 + Math.random() * 0.4);
    const t = Math.acos(2 * Math.random() - 1);
    const p = 2 * Math.PI * Math.random();
    pos[i*3]   = r * Math.sin(t) * Math.cos(p);
    pos[i*3+1] = r * Math.sin(t) * Math.sin(p);
    pos[i*3+2] = r * Math.cos(t);
    const tint = 0.7 + Math.random() * 0.3;
    col[i*3] = tint; col[i*3+1] = tint; col[i*3+2] = 0.8 + Math.random() * 0.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size: 1.4, vertexColors: true, sizeAttenuation: true, transparent: true, opacity: 0.9 });
  return new THREE.Points(geo, mat);
}
scene.add(makeStars(9000, 9000));

// ---------- Luz ----------
scene.add(new THREE.AmbientLight(0x333344, 1));
const sunLight = new THREE.PointLight(0xffffff, 2.4, 0, 1.1);
scene.add(sunLight);

// ---------- Sol ----------
const sunRadius = 22;
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(sunRadius, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0xffcc33 })
);
scene.add(sun);
// brilho do sol
const glow = new THREE.Mesh(
  new THREE.SphereGeometry(sunRadius * 1.35, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0xffaa22, transparent: true, opacity: 0.25, side: THREE.BackSide })
);
sun.add(glow);

// ---------- Planetas ----------
// Velocidades orbitais relativas (período de Mercúrio = 1 → fator de velocidade 1/período).
// Tamanhos e distâncias estilizados para caber na cena mas mantendo a ordem/proporção realista.
const PLANETS = [
  { nome: "Mercúrio", cor: 0x9c8b7a, raio: 1.6,  dist: 45,  velocidade: 4.15, tilt: 0.03,
    diametro: "4.879 km", periodo: "88 dias",   distSol: "57,9 mi km", luas: 0,  tipo: "Rochoso" },
  { nome: "Vênus",    cor: 0xe6b87a, raio: 3.8,  dist: 66,  velocidade: 1.62, tilt: 177,
    diametro: "12.104 km", periodo: "225 dias",  distSol: "108,2 mi km", luas: 0,  tipo: "Rochoso" },
  { nome: "Terra",    cor: 0x3a78d6, raio: 4.0,  dist: 92,  velocidade: 1.00, tilt: 23.4,
    diametro: "12.742 km", periodo: "365 dias",  distSol: "149,6 mi km", luas: 1,  tipo: "Rochoso" },
  { nome: "Marte",    cor: 0xc1502e, raio: 2.4,  dist: 120, velocidade: 0.53, tilt: 25,
    diametro: "6.779 km",  periodo: "687 dias",  distSol: "227,9 mi km", luas: 2,  tipo: "Rochoso" },
  { nome: "Júpiter",  cor: 0xc9a36b, raio: 13.0, dist: 175, velocidade: 0.084, tilt: 3.1,
    diametro: "139.820 km", periodo: "11,9 anos", distSol: "778,5 mi km", luas: 95, tipo: "Gigante gasoso" },
  { nome: "Saturno",  cor: 0xd9c08a, raio: 11.0, dist: 235, velocidade: 0.034, tilt: 26.7, anel: true,
    diametro: "116.460 km", periodo: "29,4 anos", distSol: "1,43 bi km", luas: 146, tipo: "Gigante gasoso" },
  { nome: "Urano",    cor: 0x8fd0d6, raio: 7.0,  dist: 290, velocidade: 0.012, tilt: 97.8, anel: true,
    diametro: "50.724 km", periodo: "84 anos",   distSol: "2,87 bi km", luas: 28, tipo: "Gigante de gelo" },
  { nome: "Netuno",   cor: 0x3b66d6, raio: 6.8,  dist: 340, velocidade: 0.006, tilt: 28.3,
    diametro: "49.244 km", periodo: "165 anos",  distSol: "4,50 bi km", luas: 16, tipo: "Gigante de gelo" },
];

const clickable = [];
const orbits = [];

PLANETS.forEach((p, i) => {
  // anel da órbita (linha)
  const seg = 128;
  const oGeo = new THREE.BufferGeometry();
  const oPos = new Float32Array((seg + 1) * 3);
  for (let s = 0; s <= seg; s++) {
    const a = (s / seg) * Math.PI * 2;
    oPos[s*3] = Math.cos(a) * p.dist; oPos[s*3+1] = 0; oPos[s*3+2] = Math.sin(a) * p.dist;
  }
  oGeo.setAttribute('position', new THREE.BufferAttribute(oPos, 3));
  scene.add(new THREE.Line(oGeo, new THREE.LineBasicMaterial({ color: 0x2a3360, transparent: true, opacity: 0.5 })));

  // pivot que gira (a órbita)
  const pivot = new THREE.Object3D();
  scene.add(pivot);

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.raio, 40, 40),
    new THREE.MeshStandardMaterial({ color: p.cor, roughness: 0.85, metalness: 0.1 })
  );
  mesh.position.x = p.dist;
  mesh.rotation.z = THREE.MathUtils.degToRad(p.tilt);
  mesh.userData = p;
  pivot.add(mesh);
  clickable.push(mesh);

  // anéis (Saturno / Urano)
  if (p.anel) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(p.raio * 1.4, p.raio * 2.3, 64),
      new THREE.MeshBasicMaterial({ color: 0xcdbb88, side: THREE.DoubleSide, transparent: true, opacity: 0.55 })
    );
    ring.rotation.x = Math.PI / 2;
    mesh.add(ring);
  }

  // fase inicial aleatória pra não alinhar tudo
  pivot.rotation.y = Math.random() * Math.PI * 2;
  orbits.push({ pivot, mesh, speed: p.velocidade });
});

// ---------- Controle de câmera: voar (WASD) + olhar (mouse arrastar) + zoom ----------
const keys = {};
addEventListener('keydown', e => keys[e.code] = true);
addEventListener('keyup',   e => keys[e.code] = false);

let yaw = Math.PI, pitch = -0.28;     // orientação inicial olhando pro centro
let dragging = false, lastX = 0, lastY = 0, moved = false;

const dom = renderer.domElement;
dom.addEventListener('mousedown', e => { dragging = true; moved = false; lastX = e.clientX; lastY = e.clientY; });
addEventListener('mouseup', () => { dragging = false; });
addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
  yaw   -= dx * 0.0025;
  pitch -= dy * 0.0025;
  pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
});
dom.addEventListener('wheel', e => {
  e.preventDefault();
  const dir = getForward();
  const step = e.deltaY * 0.6;
  camera.position.addScaledVector(dir, -step);
}, { passive: false });

function getForward() {
  return new THREE.Vector3(
    Math.sin(yaw) * Math.cos(pitch),
    Math.sin(pitch),
    Math.cos(yaw) * Math.cos(pitch)
  ).normalize();
}

function updateCamera(dt) {
  const speed = (keys['ShiftLeft'] || keys['ShiftRight'] ? 320 : 120) * dt;
  const fwd = getForward();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
  const up = new THREE.Vector3(0,1,0);

  if (keys['KeyW']) camera.position.addScaledVector(fwd, speed);
  if (keys['KeyS']) camera.position.addScaledVector(fwd, -speed);
  if (keys['KeyA']) camera.position.addScaledVector(right, -speed);
  if (keys['KeyD']) camera.position.addScaledVector(right, speed);
  if (keys['KeyE']) camera.position.addScaledVector(up, speed);
  if (keys['KeyQ']) camera.position.addScaledVector(up, -speed);

  const target = new THREE.Vector3().copy(camera.position).add(fwd);
  camera.lookAt(target);
}

// ---------- Clique em planeta ----------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const info = document.getElementById('info');

dom.addEventListener('click', e => {
  if (moved) return; // foi arrasto, não clique
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObjects(clickable)[0];
  if (hit) showInfo(hit.object.userData);
});

function showInfo(p) {
  info.querySelector('.pname').textContent = p.nome;
  const sw = info.querySelector('.swatch');
  sw.style.color = '#' + p.cor.toString(16).padStart(6, '0');
  sw.style.background = sw.style.color;
  const rows = [
    ['Tipo', p.tipo],
    ['Diâmetro', p.diametro],
    ['Período orbital', p.periodo],
    ['Distância do Sol', p.distSol],
    ['Luas', p.luas],
  ];
  info.querySelector('.pdata').innerHTML = rows.map(
    ([k, v]) => `<tr><td class="k">${k}</td><td class="v">${v}</td></tr>`
  ).join('');
  info.classList.add('show');
}

// ---------- Loop ----------
let last = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  // órbitas
  orbits.forEach(o => {
    o.pivot.rotation.y += o.speed * dt * 0.35;
    o.mesh.rotation.y += dt * 0.5; // rotação própria
  });
  sun.rotation.y += dt * 0.05;
  glow.rotation.y -= dt * 0.02;

  updateCamera(dt);
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
