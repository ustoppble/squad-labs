<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
  #cena { display:block; width:100%; height:100%; cursor:grab; touch-action:none; }
  #cena.arrastando { cursor:grabbing; }

  .painel { position:fixed; background:rgba(10,14,26,.74); border:1px solid rgba(255,255,255,.09);
    border-radius:14px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    color:#dfe6f3; }

  #topo { top:16px; left:16px; padding:14px 18px; max-width:330px; }
  #topo h1 { font-size:17px; font-weight:650; letter-spacing:.3px; color:#fff; }
  #topo h1 span { color:#ffd75e; }
  #topo p { font-size:12px; color:#93a0b8; margin-top:5px; line-height:1.55; }

  #controles { bottom:16px; left:50%; transform:translateX(-50%); padding:10px 16px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center;
    max-width:calc(100vw - 24px); }
  #controles button { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13);
    color:#e8edf7; padding:7px 13px; border-radius:9px; font-size:12.5px; cursor:pointer;
    transition:background .15s; white-space:nowrap; }
  #controles button:hover { background:rgba(255,255,255,.15); }
  #controles input[type=range] { accent-color:#ffd75e; width:150px; cursor:pointer; }
  #rot-vel { font-size:12px; color:#93a0b8; min-width:76px; }
  .chk { font-size:12.5px; display:flex; gap:6px; align-items:center; color:#c3cddd;
    cursor:pointer; user-select:none; }
  .chk input { accent-color:#ffd75e; cursor:pointer; }

  #info { top:16px; right:16px; width:274px; padding:18px 20px;
    transform:translateX(320px); transition:transform .35s cubic-bezier(.2,.8,.2,1); }
  #info.aberto { transform:none; }
  #info h2 { display:flex; align-items:center; gap:9px; font-size:17px; color:#fff; }
  #info .ponto { width:13px; height:13px; border-radius:50%; flex:none;
    box-shadow:0 0 12px 1px rgba(255,255,255,.25); }
  #info dt { font-size:10.5px; text-transform:uppercase; letter-spacing:.8px;
    color:#8b98b0; margin-top:11px; }
  #info dd { font-size:13.5px; color:#e6ecf7; margin-top:2px; line-height:1.45; }
  #fechar { position:absolute; top:8px; right:10px; background:none; border:none;
    color:#8b98b0; font-size:19px; cursor:pointer; padding:2px 7px; line-height:1; }
  #fechar:hover { color:#fff; }

  @media (max-width:640px){
    #topo { max-width:230px; padding:10px 14px; }
    #topo p { display:none; }
    #info { width:calc(100vw - 32px); }
  }
</style>
</head>
<body>
<canvas id="cena"></canvas>

<div id="topo" class="painel">
  <h1>Sistema Solar <span>3D</span></h1>
  <p>Arraste para girar a câmera · Role para dar zoom · Clique num planeta (ou no Sol) para ver detalhes. Velocidades orbitais em proporção realista.</p>
</div>

<div id="controles" class="painel">
  <button id="btn-pausa">⏸ Pausar</button>
  <input type="range" id="vel" min="0" max="200" step="1" value="20">
  <span id="rot-vel">20 dias/s</span>
  <label class="chk"><input type="checkbox" id="chk-orbitas" checked> Órbitas</label>
  <label class="chk"><input type="checkbox" id="chk-nomes" checked> Nomes</label>
  <button id="btn-camera">Recentrar</button>
</div>

<div id="info" class="painel">
  <button id="fechar" title="Fechar">×</button>
  <h2><span class="ponto" id="info-cor"></span><span id="info-nome"></span></h2>
  <dl>
    <dt>Diâmetro</dt><dd id="info-diametro"></dd>
    <dt>Período orbital</dt><dd id="info-periodo"></dd>
    <dt>Distância do Sol</dt><dd id="info-distancia"></dd>
    <dt>Duração do dia</dt><dd id="info-dia"></dd>
    <dt>Curiosidade</dt><dd id="info-fato"></dd>
  </dl>
</div>

<script>
'use strict';
const canvas = document.getElementById('cena');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

let W = 0, H = 0;
function redimensionar(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', redimensionar);
redimensionar();

/* ---------- Câmera e projeção 3D ---------- */
const cam = { yaw: 0.6, pitch: 0.42, dist: 1650, persp: 1000 };
const CAM_MIN = 380, CAM_MAX = 4200;

function projetar(x, y, z){
  const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
  const x1 = x * cy - z * sy, z1 = x * sy + z * cy;
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  const y1 = y * cp - z1 * sp, z2 = y * sp + z1 * cp;
  const zc = z2 + cam.dist;
  if (zc < 40) return null;
  const f = cam.persp / zc;
  return { x: W / 2 + x1 * f, y: H / 2 + y1 * f, f, prof: zc };
}

/* ---------- Dados dos corpos ----------
   dist = distância de exibição (comprimida); periodo em dias terrestres reais,
   então as velocidades angulares mantêm as proporções reais entre si. */
const SOL = {
  nome: 'Sol', raio: 46, dist: 0, periodo: 0, incl: 0, fase: 0,
  cores: ['#fff9e0', '#ffd75e', '#ff8c1a'],
  info: { diametro: '1.392.700 km', periodo: '— (centro do sistema)',
    distancia: '0 km', dia: '~27 dias (rotação)',
    fato: 'Concentra 99,86% de toda a massa do Sistema Solar.' }
};

const PLANETAS = [
  { nome: 'Mercúrio', raio: 8.5, dist: 150, periodo: 87.97, incl: 7.0,
    cores: ['#cfc3b7', '#8d8178', '#453e38'],
    info: { diametro: '4.879 km', periodo: '88 dias', distancia: '0,39 UA (57,9 mi km)',
      dia: '58,6 dias terrestres',
      fato: 'Menor planeta; a temperatura varia de −180 °C a 430 °C.' } },
  { nome: 'Vênus', raio: 10.8, dist: 185, periodo: 224.7, incl: 3.4,
    cores: ['#f5dcae', '#ddb877', '#8a6a3a'],
    info: { diametro: '12.104 km', periodo: '225 dias', distancia: '0,72 UA (108,2 mi km)',
      dia: '243 dias (rotação retrógrada)',
      fato: 'O planeta mais quente (~465 °C) — efeito estufa extremo.' } },
  { nome: 'Terra', raio: 11, dist: 210, periodo: 365.25, incl: 0.0,
    cores: ['#9cd6f0', '#3b78c9', '#16305e'],
    info: { diametro: '12.742 km', periodo: '365,25 dias', distancia: '1 UA (149,6 mi km)',
      dia: '23,9 horas',
      fato: 'Único planeta conhecido com vida; 71% coberto por água.' } },
  { nome: 'Marte', raio: 9.2, dist: 249, periodo: 686.98, incl: 1.85,
    cores: ['#f0956d', '#c1502f', '#6e2513'],
    info: { diametro: '6.779 km', periodo: '687 dias', distancia: '1,52 UA (227,9 mi km)',
      dia: '24,6 horas',
      fato: 'Abriga o Monte Olimpo, o maior vulcão do Sistema Solar.' } },
  { nome: 'Júpiter', raio: 33.2, dist: 431, periodo: 4332.6, incl: 1.3,
    cores: ['#f0d9b0', '#c8935f', '#7a4a28'],
    info: { diametro: '139.820 km', periodo: '11,9 anos', distancia: '5,20 UA (778,5 mi km)',
      dia: '9,9 horas',
      fato: 'Maior planeta; a Grande Mancha Vermelha é uma tempestade com séculos de idade.' } },
  { nome: 'Saturno', raio: 30, dist: 580, periodo: 10759, incl: 2.5,
    cores: ['#f2ddad', '#d6b378', '#8a6a3f'],
    info: { diametro: '116.460 km', periodo: '29,4 anos', distancia: '9,58 UA (1,43 bi km)',
      dia: '10,7 horas',
      fato: 'Seus anéis de gelo e rocha se estendem por ~280.000 km.' } },
  { nome: 'Urano', raio: 19.2, dist: 821, periodo: 30687, incl: 0.77,
    cores: ['#d3f2f5', '#7fc6cf', '#34747d'],
    info: { diametro: '50.724 km', periodo: '84 anos', distancia: '19,2 UA (2,87 bi km)',
      dia: '17,2 horas (rotação retrógrada)',
      fato: 'Gira praticamente "deitado": eixo inclinado ~98°.' } },
  { nome: 'Netuno', raio: 18.9, dist: 1035, periodo: 60190, incl: 1.77,
    cores: ['#7f9df0', '#3f5fd7', '#16256e'],
    info: { diametro: '49.244 km', periodo: '165 anos', distancia: '30,1 UA (4,50 bi km)',
      dia: '16,1 horas',
      fato: 'Tem os ventos mais rápidos do sistema: até 2.100 km/h.' } }
];
PLANETAS.forEach((p, i) => { p.fase = i * 2.39996; }); // ângulo áureo: espalha as posições iniciais

function posicaoPlaneta(p, dias){
  const ang = p.fase + TAU * dias / p.periodo;
  const x = Math.cos(ang) * p.dist;
  const z0 = Math.sin(ang) * p.dist;
  const inc = p.incl * Math.PI / 180;
  return { x, y: -z0 * Math.sin(inc), z: z0 * Math.cos(inc) };
}

/* ---------- Campo de estrelas ---------- */
const ESTRELAS = [];
(function(){
  const R = 5200;
  const paletas = ['255,255,255', '200,220,255', '255,235,200', '255,210,180'];
  for (let i = 0; i < 950; i++){
    const u = Math.random() * 2 - 1, a = Math.random() * TAU;
    const r = Math.sqrt(1 - u * u);
    ESTRELAS.push({
      x: R * r * Math.cos(a), y: R * u, z: R * r * Math.sin(a),
      tam: 0.4 + Math.random() * 1.3,
      cor: paletas[(Math.random() * paletas.length) | 0],
      base: 0.35 + Math.random() * 0.55,
      cintila: Math.random() < 0.35,
      faseC: Math.random() * TAU,
      velC: 0.5 + Math.random() * 2
    });
  }
})();

/* ---------- Estado da simulação ---------- */
let dias = 0, velocidade = 20, pausado = false;
let mostrarOrbitas = true, mostrarNomes = true;
let selecionado = null;
const projecoes = []; // hit test do quadro atual: {corpo, x, y, r, prof}

/* ---------- Interação ---------- */
let arrastando = false, moveu = 0, px = 0, py = 0, distToque = 0;

canvas.addEventListener('mousedown', e => {
  arrastando = true; moveu = 0; px = e.clientX; py = e.clientY;
  canvas.classList.add('arrastando');
});
window.addEventListener('mousemove', e => {
  if (arrastando){
    const dx = e.clientX - px, dy = e.clientY - py;
    px = e.clientX; py = e.clientY;
    moveu += Math.abs(dx) + Math.abs(dy);
    cam.yaw += dx * 0.005;
    cam.pitch = clamp(cam.pitch + dy * 0.005, -1.45, 1.45);
  } else {
    canvas.style.cursor = corpoEm(e.clientX, e.clientY) ? 'pointer' : 'grab';
  }
});
window.addEventListener('mouseup', () => {
  arrastando = false; canvas.classList.remove('arrastando');
});
canvas.addEventListener('click', e => {
  if (moveu > 6) return;
  selecionar(corpoEm(e.clientX, e.clientY));
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  cam.dist = clamp(cam.dist * (1 + Math.sign(e.deltaY) * 0.09), CAM_MIN, CAM_MAX);
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1){
    arrastando = true; moveu = 0;
    px = e.touches[0].clientX; py = e.touches[0].clientY;
  } else if (e.touches.length === 2){
    arrastando = false;
    distToque = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                           e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && arrastando){
    const dx = e.touches[0].clientX - px, dy = e.touches[0].clientY - py;
    px = e.touches[0].clientX; py = e.touches[0].clientY;
    moveu += Math.abs(dx) + Math.abs(dy);
    cam.yaw += dx * 0.005;
    cam.pitch = clamp(cam.pitch + dy * 0.005, -1.45, 1.45);
  } else if (e.touches.length === 2){
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    if (distToque > 0) cam.dist = clamp(cam.dist * distToque / d, CAM_MIN, CAM_MAX);
    distToque = d;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (arrastando && moveu < 8 && e.changedTouches.length === 1){
    const t = e.changedTouches[0];
    selecionar(corpoEm(t.clientX, t.clientY));
  }
  arrastando = false;
}, { passive: false });

function corpoEm(mx, my){
  let melhor = null, melhorProf = Infinity;
  for (const q of projecoes){
    if (Math.hypot(mx - q.x, my - q.y) <= Math.max(q.r, 10) + 5 && q.prof < melhorProf){
      melhor = q.corpo; melhorProf = q.prof;
    }
  }
  return melhor;
}

/* ---------- Painel de informações ---------- */
const elInfo = document.getElementById('info');
function selecionar(c){
  selecionado = c;
  if (!c){ elInfo.classList.remove('aberto'); return; }
  document.getElementById('info-nome').textContent = c.nome;
  document.getElementById('info-cor').style.background = c.cores[1];
  document.getElementById('info-diametro').textContent = c.info.diametro;
  document.getElementById('info-periodo').textContent = c.info.periodo;
  document.getElementById('info-distancia').textContent = c.info.distancia;
  document.getElementById('info-dia').textContent = c.info.dia;
  document.getElementById('info-fato').textContent = c.info.fato;
  elInfo.classList.add('aberto');
}
document.getElementById('fechar').addEventListener('click', () => selecionar(null));
window.addEventListener('keydown', e => { if (e.key === 'Escape') selecionar(null); });

/* ---------- Controles ---------- */
const btnPausa = document.getElementById('btn-pausa');
btnPausa.addEventListener('click', () => {
  pausado = !pausado;
  btnPausa.textContent = pausado ? '▶ Retomar' : '⏸ Pausar';
});
const elVel = document.getElementById('vel');
const rotVel = document.getElementById('rot-vel');
elVel.addEventListener('input', () => {
  velocidade = +elVel.value;
  rotVel.textContent = velocidade + ' dias/s';
});
document.getElementById('chk-orbitas').addEventListener('change', e => { mostrarOrbitas = e.target.checked; });
document.getElementById('chk-nomes').addEventListener('change', e => { mostrarNomes = e.target.checked; });
document.getElementById('btn-camera').addEventListener('click', () => {
  cam.yaw = 0.6; cam.pitch = 0.42; cam.dist = 1650;
});

/* ---------- Desenho ---------- */
function desenharOrbita(p){
  ctx.beginPath();
  let iniciou = false;
  const N = 140, inc = p.incl * Math.PI / 180;
  for (let i = 0; i <= N; i++){
    const ang = i / N * TAU;
    const x = Math.cos(ang) * p.dist, z0 = Math.sin(ang) * p.dist;
    const pr = projetar(x, -z0 * Math.sin(inc), z0 * Math.cos(inc));
    if (!pr){ iniciou = false; continue; }
    if (!iniciou){ ctx.moveTo(pr.x, pr.y); iniciou = true; }
    else ctx.lineTo(pr.x, pr.y);
  }
  const sel = selecionado === p;
  ctx.strokeStyle = sel ? p.cores[1] : 'rgba(255,255,255,0.14)';
  ctx.globalAlpha = sel ? 0.6 : 1;
  ctx.lineWidth = sel ? 1.5 : 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function desenharSol(pr, t){
  const r = Math.max(SOL.raio * pr.f, 6);
  const pulso = 1 + 0.05 * Math.sin(t * 1.6);
  const gRaio = r * 3.4 * pulso;
  let g = ctx.createRadialGradient(pr.x, pr.y, r * 0.4, pr.x, pr.y, gRaio);
  g.addColorStop(0, 'rgba(255,190,80,0.55)');
  g.addColorStop(0.35, 'rgba(255,140,40,0.18)');
  g.addColorStop(1, 'rgba(255,110,20,0)');
  ctx.beginPath(); ctx.arc(pr.x, pr.y, gRaio, 0, TAU);
  ctx.fillStyle = g; ctx.fill();

  g = ctx.createRadialGradient(pr.x - r * 0.2, pr.y - r * 0.2, r * 0.1, pr.x, pr.y, r);
  g.addColorStop(0, SOL.cores[0]);
  g.addColorStop(0.55, SOL.cores[1]);
  g.addColorStop(1, SOL.cores[2]);
  ctx.beginPath(); ctx.arc(pr.x, pr.y, r, 0, TAU);
  ctx.fillStyle = g; ctx.fill();

  if (mostrarNomes){
    ctx.font = '11px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(225,232,245,0.85)';
    ctx.fillText('Sol', pr.x, pr.y - r - 9);
  }
}

function desenharAneis(p, pos, prPlaneta, passe){
  const tilt = 0.47, N = 72, atras = passe === 'tras';
  const cfg = [
    [1.42, 4.5, '216,194,144', 0.32],
    [1.68, 6.5, '226,205,158', 0.50],
    [1.95, 4.0, '190,168,122', 0.28]
  ];
  for (const [mult, esp, cor, alfa] of cfg){
    const R = p.raio * mult;
    ctx.beginPath();
    let prev = null;
    for (let i = 0; i <= N; i++){
      const a = i / N * TAU;
      const lx = Math.cos(a) * R, lz = Math.sin(a) * R;
      const pt = projetar(pos.x + lx, pos.y - lz * Math.sin(tilt), pos.z + lz * Math.cos(tilt));
      if (!pt){ prev = null; continue; }
      if (prev && ((pt.prof >= prPlaneta.prof) === atras)){
        ctx.moveTo(prev.x, prev.y); ctx.lineTo(pt.x, pt.y);
      }
      prev = pt;
    }
    ctx.strokeStyle = 'rgba(' + cor + ',' + alfa + ')';
    ctx.lineWidth = Math.max(esp * prPlaneta.f, 0.6);
    ctx.stroke();
  }
}

function faixasJupiter(x, y, r){
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.clip();
  ctx.globalAlpha = 0.22;
  const faixas = [[-0.52, '#8a5a30'], [-0.15, '#e8cfa0'], [0.18, '#8a5a30'], [0.55, '#e8cfa0']];
  for (const [fy, cor] of faixas){
    ctx.fillStyle = cor;
    ctx.fillRect(x - r, y + fy * r - r * 0.08, r * 2, r * 0.16);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function desenharPlaneta(p, pos, pr, r, projSol){
  const { x, y } = pr;
  let dx = 0, dy = 0; // lado iluminado aponta para o Sol
  if (projSol){
    const ddx = projSol.x - x, ddy = projSol.y - y;
    const m = Math.hypot(ddx, ddy) || 1;
    dx = ddx / m; dy = ddy / m;
  }

  if (p.nome === 'Saturno') desenharAneis(p, pos, pr, 'tras');

  const g = ctx.createRadialGradient(x + dx * r * 0.45, y + dy * r * 0.45, r * 0.08, x, y, r);
  g.addColorStop(0, p.cores[0]);
  g.addColorStop(0.55, p.cores[1]);
  g.addColorStop(1, p.cores[2]);
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU);
  ctx.fillStyle = g; ctx.fill();

  if (p.nome === 'Júpiter') faixasJupiter(x, y, r);
  if (p.nome === 'Terra'){
    ctx.beginPath(); ctx.arc(x, y, r, 0, TAU);
    ctx.strokeStyle = 'rgba(140,200,255,0.35)';
    ctx.lineWidth = Math.max(r * 0.06, 0.8);
    ctx.stroke();
  }

  if (p.nome === 'Saturno') desenharAneis(p, pos, pr, 'frente');

  if (mostrarNomes){
    ctx.font = '11px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(225,232,245,0.85)';
    const desloc = p.nome === 'Saturno' ? r * 2.05 : r;
    ctx.fillText(p.nome, x, y - desloc - 8);
  }
}

function desenhar(t){
  ctx.fillStyle = '#020308';
  ctx.fillRect(0, 0, W, H);

  for (const s of ESTRELAS){
    const pr = projetar(s.x, s.y, s.z);
    if (!pr || pr.x < -8 || pr.x > W + 8 || pr.y < -8 || pr.y > H + 8) continue;
    let a = s.base;
    if (s.cintila) a *= 0.65 + 0.35 * Math.sin(t * s.velC + s.faseC);
    ctx.fillStyle = 'rgba(' + s.cor + ',' + a.toFixed(3) + ')';
    ctx.beginPath(); ctx.arc(pr.x, pr.y, s.tam, 0, TAU); ctx.fill();
  }

  if (mostrarOrbitas) for (const p of PLANETAS) desenharOrbita(p);

  projecoes.length = 0;
  const itens = [];
  const projSol = projetar(0, 0, 0);
  if (projSol){
    itens.push({ prof: projSol.prof, fn: () => desenharSol(projSol, t) });
    projecoes.push({ corpo: SOL, x: projSol.x, y: projSol.y,
      r: Math.max(SOL.raio * projSol.f, 6), prof: projSol.prof });
  }
  for (const p of PLANETAS){
    const pos = posicaoPlaneta(p, dias);
    const pr = projetar(pos.x, pos.y, pos.z);
    if (!pr) continue;
    const r = Math.max(p.raio * pr.f, 2.2);
    itens.push({ prof: pr.prof, fn: () => desenharPlaneta(p, pos, pr, r, projSol) });
    projecoes.push({ corpo: p, x: pr.x, y: pr.y, r, prof: pr.prof });
  }
  itens.sort((a, b) => b.prof - a.prof); // mais distante primeiro
  for (const item of itens) item.fn();

  if (selecionado){
    const pj = projecoes.find(q => q.corpo === selecionado);
    if (pj){
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.arc(pj.x, pj.y, pj.r + 7, 0, TAU);
      ctx.strokeStyle = 'rgba(255,215,94,0.85)';
      ctx.lineWidth = 1.3;
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

/* ---------- Loop ---------- */
let tAnterior = performance.now();
function quadro(t){
  const dt = Math.min((t - tAnterior) / 1000, 0.05);
  tAnterior = t;
  if (!pausado) dias += velocidade * dt;
  desenhar(t / 1000);
  requestAnimationFrame(quadro);
}
requestAnimationFrame(quadro);
</script>
